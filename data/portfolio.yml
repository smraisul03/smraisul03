        authors:
          - smraisul03

      - name: Facy
        image: '/images/portfolio/facialrecognition.jpg'
        link: https://github.com/smraisul03/Facy
        linktext: 'Github'
        description: "The application uses Python and the OpenCV package to detect and track a user's face in real time. It uses computer vision techniques to identify the user's face in a video stream, and then follows it as it moves. The application can be used for a variety of purposes, such as monitoring the user's face for security purposes, or visualizing the user's face in augmented reality applications. Overall, the application provides a convenient and reliable way to detect and track faces using Python and OpenCV."
        tags:
          - Computer Vision
          - Artificial Intelligence
        status: 'Finished'
        start: 'June 2022'
        end: 'August 2022'
        authors:
          - smraisul03

