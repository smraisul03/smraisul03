      - name: Barcelona Real Estate Prediction 
        image: '/images/portfolio/barcelona.jpg'
        link: https://github.com/
        linktext: 'Github'
        description: 'The project aims to use Python and its popular packages to develop a machine learning model that can predict the price of houses in Barcelona. The model will be trained on a dataset of historical housing prices and relevant features, and will be able to make accurate predictions for new properties. This will be useful for buyers and sellers in the real estate market. The project will involve cleaning and preprocessing the data, training and evaluating the model, and using it to make predictions.'
        tags:
          - Machine Learning
          - Data Mining
        status: 'On Hold'
